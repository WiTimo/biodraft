<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>Three.js WebGPU Cloth – Independent Patches</title>
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #888;
        }

        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-family: sans-serif;
            z-index: 1;
        }
    </style>
</head>

<body>
    <script type="importmap">
  {
    "imports": {
      "three":         "https://unpkg.com/three@0.173.0/build/three.webgpu.js",
      "three/webgpu":  "https://unpkg.com/three@0.173.0/build/three.webgpu.js",
      "three/tsl":     "https://unpkg.com/three@0.173.0/build/three.tsl.js",
      "three/addons/": "https://unpkg.com/three@0.173.0/examples/jsm/",
      "delaunator":    "https://esm.sh/delaunator@5.0.0"
    }
  }
  </script>

    <script type="module">
        import * as THREE from 'three';
        import {
            Fn, If, Return, instancedArray, instanceIndex,
            uniform, attribute, select, uint, Loop,
            float, triNoise3D, time
        } from 'three/tsl';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GUI } from 'three/addons/libs/lil-gui.module.min.js';
        import Delaunator from 'delaunator';

        // globals
        let renderer, scene, camera, controls;
        let clothMaterial, sphere;
        let stiffnessUniform, windUniform, spherePositionUniform, dampingUniform, gravityBaseUniform, gravityAccelUniform;
        let clothPatches = [];
        let patternData = null;
        const sphereRadius = 0.15;
        const initialClothHeight = sphereRadius + 0.5;
        const boundarySegments = 800;
        const params = {
            showWireframe: true,
            showSphere: true,
            wind: 0.0,
            stiffness: 0.5
        };
        const clock = new THREE.Clock();
        let timeSinceLastStep = 0;
        let timestamp = 0;

        // helper: point in polygon
        function pointInPolygon(px, py, verts) {
            let inside = false;
            for (let i = 0, j = verts.length - 1; i < verts.length; j = i++) {
                const xi = verts[i].x, yi = verts[i].y;
                const xj = verts[j].x, yj = verts[j].y;
                const intersect = ((yi > py) !== (yj > py)) &&
                    (px < (xj - xi) * ((py - yi) / (yj - yi)) + xi);
                if (intersect) inside = !inside;
            }
            return inside;
        }

        // load patterns JSON
        async function loadConfig() {
            try {
                const res = await fetch('./patterns_with_seams.json');
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                patternData = await res.json();
            } catch (e) {
                console.error('Failed to load patterns:', e);
            }
        }

        // init
        init();
        async function init() {
            await loadConfig();
            if (!patternData?.patterns?.length) {
                console.error('No pattern data');
                return;
            }

            // WebGPU renderer
            renderer = new THREE.WebGPURenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // scene & camera
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.01, 10);
            camera.position.set(-1.6, -0.1, -1.6);
            controls = new OrbitControls(camera, renderer.domElement);
            controls.minDistance = 1; controls.maxDistance = 3;
            controls.target.set(0, -0.1, 0);
            controls.update();

            // lights
            const ambient = new THREE.AmbientLight(0xffffff, 0.5);
            const dir = new THREE.DirectionalLight(0xffffff, 1);
            dir.position.set(1, 1, 1);
            scene.add(ambient, dir);

            // uniforms
            setupUniforms();

            // base material
            clothMaterial = new THREE.MeshPhysicalNodeMaterial({
                color: 0x204080,
                side: THREE.DoubleSide,
                roughness: 1,
                metalness: 0.3
            });

            // build each cloth patch
            clothPatches = patternData.patterns
                .map(pat => setupVerletFromDelaunay(pat))
                .filter(p => !!p);

            // sphere actor
            setupSphere();

            // GUI
            const gui = new GUI();
            gui.add(params, 'showWireframe').name('Wireframe');
            gui.add(params, 'showSphere').name('Show Sphere');
            gui.add(params, 'wind', 0, 2, 0.01).name('Wind');
            gui.add(params, 'stiffness', 0.1, 1, 0.01).name('Stiffness');
            gui.add({ resetSimulation }, 'resetSimulation').name('Reset Simulation');

            window.addEventListener('resize', onWindowResize);
            renderer.setAnimationLoop(render);
        }

        // create one patch
        function setupVerletFromDelaunay(pat) {
            const pts = pat.points;
            if (!pts || pts.length < 3) return null;

            // normalize coords
            let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
            for (let p of pts) {
                minX = Math.min(minX, p.x);
                maxX = Math.max(maxX, p.x);
                minY = Math.min(minY, p.y);
                maxY = Math.max(maxY, p.y);
            }
            const cx = (minX + maxX) / 2;
            const cy = (minY + maxY) / 2;
            const scl = 1 / Math.max(maxX - minX, maxY - minY);
            const norm = p => ({ x: (p.x - cx) * scl, y: (p.y - cy) * scl });

            // boundary shape
            const shape = new THREE.Shape();
            const p0 = norm(pts[0]); shape.moveTo(p0.x, p0.y);
            for (let i = 1; i < pts.length; i++) {
                const A = pts[i - 1], B = pts[i];
                const nA = norm(A), nB = norm(B);
                const hasBez = (A.handleOut?.dx || A.handleOut?.dy) || (B.handleIn?.dx || B.handleIn?.dy);
                if (hasBez) {
                    const cp1 = norm({ x: A.x + (A.handleOut?.dx || 0), y: A.y + (A.handleOut?.dy || 0) });
                    const cp2 = norm({ x: B.x + (B.handleIn?.dx || 0), y: B.y + (B.handleIn?.dy || 0) });
                    shape.bezierCurveTo(cp1.x, cp1.y, cp2.x, cp2.y, nB.x, nB.y);
                } else {
                    shape.lineTo(nB.x, nB.y);
                }
            }
            shape.lineTo(p0.x, p0.y);
            const boundary = shape.getSpacedPoints(boundarySegments);
            if (boundary.length < 3) return null;

            // bbox
            let bbMinX = Infinity, bbMaxX = -Infinity, bbMinY = Infinity, bbMaxY = -Infinity;
            for (let v of boundary) {
                bbMinX = Math.min(bbMinX, v.x);
                bbMaxX = Math.max(bbMaxX, v.x);
                bbMinY = Math.min(bbMinY, v.y);
                bbMaxY = Math.max(bbMaxY, v.y);
            }

            // interior sampling
            const interior = [];
            const step = 0.02;
            for (let x = bbMinX; x <= bbMaxX; x += step) {
                for (let y = bbMinY; y <= bbMaxY; y += step) {
                    if (pointInPolygon(x, y, boundary)) interior.push({ x, y });
                }
            }

            // combine
            const all = boundary.map(v => ({ x: v.x, y: v.y })).concat(interior);

            // Delaunay
            const dela = Delaunator.from(all.map(p => [p.x, p.y]));
            const rawT = dela.triangles;
            const idx = [];
            for (let i = 0; i < rawT.length; i += 3) {
                const a = rawT[i], b = rawT[i + 1], c = rawT[i + 2];
                const pa = all[a], pb = all[b], pc = all[c];
                const ccx = (pa.x + pb.x + pc.x) / 3, ccy = (pa.y + pb.y + pc.y) / 3;
                if (pointInPolygon(ccx, ccy, boundary)) idx.push(a, b, c);
            }

            // verts & springs
            const verts = [], springs = [];
            for (let i = 0; i < all.length; i++) {
                verts.push({
                    id: i,
                    position: new THREE.Vector3(all[i].x, initialClothHeight, all[i].y),
                    isFixed: 0, springIds: []
                });
            }
            function addSpring(i0, i1) {
                const v0 = verts[i0], v1 = verts[i1];
                for (let sid of v0.springIds) {
                    const sp = springs[sid];
                    if ((sp.v0 === i0 && sp.v1 === i1) || (sp.v0 === i1 && sp.v1 === i0)) return;
                }
                const sid = springs.length;
                springs.push({ v0: i0, v1: i1 });
                v0.springIds.push(sid);
                v1.springIds.push(sid);
            }
            for (let i = 0; i < idx.length; i += 3) {
                addSpring(idx[i], idx[i + 1]);
                addSpring(idx[i + 1], idx[i + 2]);
                addSpring(idx[i + 2], idx[i]);
            }
            const initialPositions = verts.map(v => v.position.clone());

            // buffers
            const n = verts.length;
            const posArr = new Float32Array(n * 3);
            const paramArr = new Uint32Array(n * 3);
            const springList = [];
            for (let i = 0; i < n; i++) {
                const v = verts[i];
                posArr.set([v.position.x, v.position.y, v.position.z], i * 3);
                paramArr.set([v.isFixed, v.springIds.length, springList.length], i * 3);
                springList.push(...v.springIds);
            }
            const vertexPositionBuffer = instancedArray(posArr, 'vec3').setPBO(true);
            const vertexForceBuffer = instancedArray(n, 'vec3');
            const vertexParamsBuffer = instancedArray(paramArr, 'uvec3');
            const springListBuffer = instancedArray(new Uint32Array(springList), 'uint').setPBO(true);

            const m = springs.length;
            const idArr = new Uint32Array(m * 2);
            const restArr = new Float32Array(m);
            for (let i = 0; i < m; i++) {
                idArr.set([springs[i].v0, springs[i].v1], i * 2);
                restArr[i] = verts[springs[i].v0].position.distanceTo(verts[springs[i].v1].position);
            }
            const springVertexIdBuffer = instancedArray(idArr, 'uvec2').setPBO(true);
            const springRestLengthBuffer = instancedArray(restArr, 'float');
            const springForceBuffer = instancedArray(m * 3, 'vec3').setPBO(true);

            // compute shaders
            const computeSpringForces = Fn(() => {
                If(instanceIndex.greaterThanEqual(uint(m)), () => Return());
                const vid = springVertexIdBuffer.element(instanceIndex);
                const rest = springRestLengthBuffer.element(instanceIndex);
                const p0 = vertexPositionBuffer.element(vid.x);
                const p1 = vertexPositionBuffer.element(vid.y);
                const d = p1.sub(p0).toVar();
                const dist = d.length().max(0.000001).toVar();
                const f = dist.sub(rest)
                    .mul(stiffnessUniform)
                    .mul(d)
                    .mul(0.5)
                    .div(dist);
                springForceBuffer.element(instanceIndex).assign(f);
            })().compute(m);

            const computeVertexForces = Fn(() => {
                If(instanceIndex.greaterThanEqual(uint(n)), () => Return());
                const param = vertexParamsBuffer.element(instanceIndex).toVar();
                If(param.x.greaterThan(0), () => Return());
                const num = param.y, ptr = param.z;
                let pos = vertexPositionBuffer.element(instanceIndex).toVar('pos');
                let force = vertexForceBuffer.element(instanceIndex).toVar('force');
                force.mulAssign(dampingUniform);

                const end = ptr.add(num).toVar('end');
                Loop({ start: ptr, end, type: 'uint', condition: '<' }, ({ i }) => {
                    const sid = springListBuffer.element(i).toVar();
                    const sf = springForceBuffer.element(sid);
                    const sv = springVertexIdBuffer.element(sid);
                    const sign = select(sv.x.equal(instanceIndex), 1.0, -1.0);
                    force.addAssign(sf.mul(sign));
                });

                const gDyn = gravityAccelUniform.mul(time).add(gravityBaseUniform);
                force.y.subAssign(gDyn);

                const nse = triNoise3D(pos, 1, time).sub(0.2).mul(0.0002);
                force.x.addAssign(nse.mul(windUniform));
                force.z.addAssign(nse.mul(windUniform));

                let nextPos = pos.add(force).toVar('nextPos');
                const dir = nextPos.sub(spherePositionUniform).toVar('dir');
                const dist = dir.length().toVar('dist');
                If(dist.lessThan(float(sphereRadius)), () => {
                    const nDir = dir.div(dist);
                    nextPos.assign(spherePositionUniform.add(nDir.mul(float(sphereRadius))));
                    const v = nextPos.sub(pos);
                    const speed = v.length();
                    const rest = select(speed.greaterThan(float(0.005)), float(1.2), float(0.8));
                    force.assign(v.mul(rest));
                });

                vertexForceBuffer.element(instanceIndex).assign(force);
                vertexPositionBuffer.element(instanceIndex).assign(nextPos);
            })().compute(n);

            // mesh
            const geom = new THREE.BufferGeometry();
            geom.setIndex(new THREE.BufferAttribute(new Uint32Array(idx), 1));
            const vidArr = new Uint32Array(n);
            for (let i = 0; i < n; i++) vidArr[i] = i;
            geom.setAttribute('vertexId', new THREE.BufferAttribute(vidArr, 1, false));

            const mat = clothMaterial.clone();
            mat.positionNode = Fn(() => vertexPositionBuffer.element(attribute('vertexId')))();
            const mesh = new THREE.Mesh(geom, mat);
            mesh.frustumCulled = false;
            scene.add(mesh);

            return { computeSpringForces, computeVertexForces, mesh };
        }

        // sphere
        function setupSphere() {
            const geo = new THREE.IcosahedronGeometry(sphereRadius * 0.95, 4);
            const mat = new THREE.MeshStandardNodeMaterial();
            sphere = new THREE.Mesh(geo, mat);
            scene.add(sphere);
        }

        // uniforms
        function setupUniforms() {
            stiffnessUniform = uniform(params.stiffness);
            windUniform = uniform(params.wind);
            spherePositionUniform = uniform(new THREE.Vector3());
            dampingUniform = uniform(0.98);
            gravityBaseUniform = uniform(0.00007);
            gravityAccelUniform = uniform(0.000002);
        }

        // reset
        function resetSimulation() {
            // reload page for full reset
            window.location.reload();
        }

        // render
        async function render() {
            clothPatches.forEach(p => p.mesh.material.wireframe = params.showWireframe);
            sphere.visible = params.showSphere;

            const dt = Math.min(clock.getDelta(), 1 / 60);
            timeSinceLastStep += dt;
            const tStep = 1 / 300;
            while (timeSinceLastStep >= tStep) {
                timestamp += tStep;
                timeSinceLastStep -= tStep;

                // animate sphere
                sphere.position.set(
                    Math.sin(timestamp * 2.1) * 0.1,
                    0,
                    Math.sin(timestamp * 0.8) * 0.1
                );
                spherePositionUniform.value.copy(sphere.position);

                windUniform.value = params.wind;
                stiffnessUniform.value = params.stiffness;

                for (const patch of clothPatches) {
                    await renderer.computeAsync(patch.computeSpringForces);
                    await renderer.computeAsync(patch.computeVertexForces);
                }
            }

            await renderer.renderAsync(scene, camera);
        }

        // resize
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>

</html>
