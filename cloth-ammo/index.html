<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Three.js WebGPU Cloth – Smooth Curves + Sphere Collision</title>
  <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #888;
    }
    #info {
      position: absolute;
      top: 10px;
      left: 10px;
      color: #fff;
      font-family: sans-serif;
      z-index: 1;
    }
  </style>
</head>
<body>
  <div id="info">
    <a href="https://threejs.org" target="_blank" rel="noopener">three.js</a> WebGPU – Cloth Simulation<br />
    Smooth Bézier edges + sphere collision. Use the GUI to toggle wireframe/sphere.
  </div>

  <script type="importmap">
  {
    "imports": {
      "three":         "https://unpkg.com/three@0.173.0/build/three.webgpu.js",
      "three/webgpu":  "https://unpkg.com/three@0.173.0/build/three.webgpu.js",
      "three/tsl":     "https://unpkg.com/three@0.173.0/build/three.tsl.js",
      "three/addons/": "https://unpkg.com/three@0.173.0/examples/jsm/",
      "delaunator":    "https://esm.sh/delaunator@5.0.0"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import {
      Fn, If, Return, instancedArray, instanceIndex,
      uniform, attribute, select, uint, Loop,
      float, triNoise3D, time
    } from 'three/tsl';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';
    import { GUI } from 'three/addons/libs/lil-gui.module.min.js';
    import Delaunator from 'delaunator';

    // Renderer, scene, camera, controls
    let renderer, scene, camera, controls;

    // Cloth & sphere parameters
    const sphereRadius        = 0.15;
    const initialClothHeight  = sphereRadius + 0.5;
    const boundarySegments    = 800;   // higher → smoother curves

    // GPU buffers & compute shaders
    let vertexPositionBuffer, vertexForceBuffer, vertexParamsBuffer;
    let springListBuffer, springVertexIdBuffer, springRestLengthBuffer, springForceBuffer;
    let computeSpringForces, computeVertexForces;
    let stiffnessUniform, windUniform, spherePositionUniform, sphereUniform, dampingUniform;

    // Mesh & material
    let clothMesh, clothMaterial, sphere;

    // Verlet data
    const verletVertices = [];
    const verletSprings  = [];

    // Timing
    const clock = new THREE.Clock();
    let timeSinceLastStep = 0;
    let timestamp         = 0;

    // GUI params
    const params = {
      showWireframe: true,
      showSphere:    true,
      wind:          0.0,
      stiffness:     0.4
    };

    // JSON pattern data + normalization fn
    let patternData = null;
    let normalizePoint;

    // Ray-casting point-in-polygon
    function pointInPolygon(px, py, verts) {
      let inside = false, n = verts.length;
      for (let i = 0, j = n - 1; i < n; j = i++) {
        const xi = verts[i].x, yi = verts[i].y;
        const xj = verts[j].x, yj = verts[j].y;
        const intersect = ((yi > py) !== (yj > py))
          && (px < (xj - xi) * ((py - yi) / (yj - yi)) + xi);
        if (intersect) inside = !inside;
      }
      return inside;
    }
    function pointInAnyPolygon(x, y, polys) {
      for (let poly of polys) {
        if (pointInPolygon(x, y, poly)) return true;
      }
      return false;
    }

    // Load your JSON pattern file
    async function loadConfig() {
      try {
        const res = await fetch('./patterns_with_seams.json');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        patternData = await res.json();
      } catch (e) {
        console.error('Failed to load patterns:', e);
      }
    }

    // Entry point
    init();
    async function init() {
      await loadConfig();
      if (!patternData || !patternData.patterns) {
        console.error('No pattern data');
        return;
      }

      // Compute global bounding box to normalize all patterns
      let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
      for (let pat of patternData.patterns) {
        for (let pt of pat.points) {
          minX = Math.min(minX, pt.x);
          maxX = Math.max(maxX, pt.x);
          minY = Math.min(minY, pt.y);
          maxY = Math.max(maxY, pt.y);
        }
      }
      const cx = (minX + maxX) / 2,
            cy = (minY + maxY) / 2,
            scal = 1 / Math.max(maxX - minX, maxY - minY);
      normalizePoint = p => ({ x: (p.x - cx) * scal, y: (p.y - cy) * scal });

      // Three.js setup
      renderer = new THREE.WebGPURenderer({ antialias: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(innerWidth, innerHeight);
      document.body.appendChild(renderer.domElement);

      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(40, innerWidth/innerHeight, 0.01, 10);
      camera.position.set(-1.6, -0.1, -1.6);

      controls = new OrbitControls(camera, renderer.domElement);
      controls.minDistance = 1;
      controls.maxDistance = 3;
      controls.target.set(0, -0.1, 0);
      controls.update();

      // HDR environment
      const rgbe = new RGBELoader().setPath('textures/equirectangular/');
      const hdr  = await rgbe.loadAsync('royal_esplanade_1k.hdr');
      hdr.mapping = THREE.EquirectangularReflectionMapping;
      scene.background = hdr;
      scene.environment = hdr;

      // Build cloth & Verlet data
      if (!setupVerletFromDelaunay()) {
        console.warn('Cloth setup failed');
        return;
      }

      // Sphere for collision
      setupSphere();

      // Uniforms & compute shaders
      setupUniforms();
      setupComputeShaders();

      // GUI
      const gui = new GUI();
      gui.add(params, 'showWireframe').name('Triangle Wireframe');
      gui.add(params, 'showSphere').name('Show Sphere');
      gui.add(params, 'wind', 0, 2, 0.01).name('Wind');
      gui.add(stiffnessUniform, 'value', 0.1, 1, 0.01).name('Stiffness');

      window.addEventListener('resize', onWindowResize);
      renderer.setAnimationLoop(render);
    }

    // Merge of V1 + high-res sampling from V2
    function setupVerletFromDelaunay() {
      // 1) Build one Shape per pattern, sample Béziers densely
      const boundaryPolygons = [];
      for (let pat of patternData.patterns) {
        const pts = pat.points;
        if (!pts || pts.length < 3) continue;
        const shape = new THREE.Shape();
        const p0 = normalizePoint(pts[0]);
        shape.moveTo(p0.x, p0.y);
        for (let i = 1; i < pts.length; i++) {
          const A = pts[i-1], B = pts[i];
          const nA = normalizePoint(A), nB = normalizePoint(B);
          const hasBez = (A.handleOut && (A.handleOut.dx||A.handleOut.dy))
                      || (B.handleIn  && (B.handleIn.dx||B.handleIn.dy));
          if (hasBez) {
            const cp1 = normalizePoint({ x: A.x + (A.handleOut?.dx||0),
                                         y: A.y + (A.handleOut?.dy||0) });
            const cp2 = normalizePoint({ x: B.x + (B.handleIn?.dx||0),
                                         y: B.y + (B.handleIn?.dy||0) });
            shape.bezierCurveTo(cp1.x, cp1.y, cp2.x, cp2.y, nB.x, nB.y);
          } else {
            shape.lineTo(nB.x, nB.y);
          }
        }
        // close it
        shape.lineTo(p0.x, p0.y);

        const sampled = shape.getSpacedPoints(boundarySegments);
        if (sampled.length >= 3) boundaryPolygons.push(sampled);
      }
      if (!boundaryPolygons.length) return false;

      // 2) Global bounding‐box of all boundary verts
      let bbMinX = Infinity, bbMaxX = -Infinity,
          bbMinY = Infinity, bbMaxY = -Infinity;
      for (let poly of boundaryPolygons) {
        for (let v of poly) {
          bbMinX = Math.min(bbMinX, v.x);
          bbMaxX = Math.max(bbMaxX, v.x);
          bbMinY = Math.min(bbMinY, v.y);
          bbMaxY = Math.max(bbMaxY, v.y);
        }
      }

      // 3) Fill interior grid
      const interior = [];
      const step = 0.02;
      for (let x = bbMinX; x <= bbMaxX; x += step) {
        for (let y = bbMinY; y <= bbMaxY; y += step) {
          if (pointInAnyPolygon(x,y, boundaryPolygons)) {
            interior.push({ x, y });
          }
        }
      }

      // 4) Merge boundary + interior
      const allPts = [];
      for (let poly of boundaryPolygons) {
        for (let v of poly) allPts.push({ x:v.x, y:v.y });
      }
      for (let p of interior) allPts.push(p);

      // 5) Delaunay triangulate
      const coords = allPts.map(p => [p.x, p.y]);
      const dela   = Delaunator.from(coords);
      const rawT   = dela.triangles;

      // 6) Filter triangles whose centroid is outside
      const idx = [];
      for (let i = 0; i < rawT.length; i += 3) {
        const [a,b,c] = [rawT[i], rawT[i+1], rawT[i+2]];
        const pa = allPts[a], pb = allPts[b], pc = allPts[c];
        const cx = (pa.x+pb.x+pc.x)/3, cy = (pa.y+pb.y+pc.y)/3;
        if (pointInAnyPolygon(cx, cy, boundaryPolygons)) {
          idx.push(a,b,c);
        }
      }

      // 7) Build Verlet vertices & springs
      verletVertices.length = 0;
      verletSprings.length  = 0;
      for (let i = 0; i < allPts.length; i++) {
        const p = allPts[i];
        verletVertices.push({
          id:       i,
          position: new THREE.Vector3(p.x, initialClothHeight, p.y),
          isFixed:  0,
          springIds:[]
        });
      }
      function addSpring(i0,i1) {
        const v0=verletVertices[i0], v1=verletVertices[i1];
        for (let sid of v0.springIds) {
          const sp = verletSprings[sid];
          if ((sp.vertex0.id===i0&&sp.vertex1.id===i1)||
              (sp.vertex0.id===i1&&sp.vertex1.id===i0)) return;
        }
        const sid = verletSprings.length;
        verletSprings.push({ id:sid, vertex0:v0, vertex1:v1 });
        v0.springIds.push(sid);
        v1.springIds.push(sid);
      }
      for (let i = 0; i < idx.length; i += 3) {
        addSpring(idx[i+0], idx[i+1]);
        addSpring(idx[i+1], idx[i+2]);
        addSpring(idx[i+2], idx[i+0]);
      }

      // 8) Upload to GPU
      setupVerletVertexBuffers();
      setupVerletSpringBuffers();

      // 9) Build the cloth mesh (NodeMaterial)
      const geom = new THREE.BufferGeometry();
      geom.setIndex(new THREE.BufferAttribute(new Uint32Array(idx), 1));
      const vid = new Uint32Array(verletVertices.length);
      for (let i=0; i<vid.length; i++) vid[i]=i;
      geom.setAttribute('vertexId', new THREE.BufferAttribute(vid,1,false));

      clothMaterial = new THREE.MeshPhysicalNodeMaterial({
        color:       0x204080,
        side:        THREE.DoubleSide,
        transparent: false,
        opacity:     1,
        roughness:   1,
        metalness:   0.3
      });
      clothMaterial.positionNode = Fn(() => {
        return vertexPositionBuffer.element(attribute('vertexId'));
      })();

      clothMesh = new THREE.Mesh(geom, clothMaterial);
      clothMesh.frustumCulled = false;
      scene.add(clothMesh);

      return true;
    }

    function setupVerletVertexBuffers() {
      const n = verletVertices.length;
      const posArr   = new Float32Array(n*3);
      const paramArr = new Uint32Array(n*3);
      const springList = [];
      for (let i=0; i<n; i++) {
        const v = verletVertices[i];
        posArr[i*3  ] = v.position.x;
        posArr[i*3+1] = v.position.y;
        posArr[i*3+2] = v.position.z;
        paramArr[i*3  ] = v.isFixed;
        paramArr[i*3+1] = v.springIds.length;
        paramArr[i*3+2] = springList.length;
        springList.push(...v.springIds);
      }
      vertexPositionBuffer = instancedArray(posArr, 'vec3').setPBO(true);
      vertexForceBuffer    = instancedArray(n,    'vec3');
      vertexParamsBuffer   = instancedArray(paramArr,'uvec3');
      springListBuffer     = instancedArray(new Uint32Array(springList), 'uint').setPBO(true);
    }
    function setupVerletSpringBuffers() {
      const m = verletSprings.length;
      const idArr   = new Uint32Array(m*2);
      const restArr = new Float32Array(m);
      for (let i=0; i<m; i++) {
        const s = verletSprings[i];
        idArr[i*2  ] = s.vertex0.id;
        idArr[i*2+1] = s.vertex1.id;
        restArr[i]   = s.vertex0.position.distanceTo(s.vertex1.position);
      }
      springVertexIdBuffer   = instancedArray(idArr,   'uvec2').setPBO(true);
      springRestLengthBuffer = instancedArray(restArr, 'float');
      springForceBuffer      = instancedArray(m*3,     'vec3').setPBO(true);
    }

    function setupSphere() {
      const geo = new THREE.IcosahedronGeometry(sphereRadius*0.95, 4);
      const mat = new THREE.MeshStandardNodeMaterial();
      sphere = new THREE.Mesh(geo, mat);
      scene.add(sphere);
    }

    function setupUniforms() {
      stiffnessUniform      = uniform(params.stiffness);
      windUniform           = uniform(params.wind);
      spherePositionUniform = uniform(new THREE.Vector3());
      sphereUniform         = uniform(1.0);
      dampingUniform        = uniform(0.98);
    }

    function setupComputeShaders() {
      const vCount = verletVertices.length;
      const sCount = verletSprings.length;

      computeSpringForces = Fn(() => {
        If(instanceIndex.greaterThanEqual(uint(sCount)), () => Return());
        const vid  = springVertexIdBuffer.element(instanceIndex);
        const rest = springRestLengthBuffer.element(instanceIndex);
        const p0   = vertexPositionBuffer.element(vid.x);
        const p1   = vertexPositionBuffer.element(vid.y);
        const d    = p1.sub(p0).toVar();
        const dist = d.length().max(0.000001).toVar();
        const f    = dist.sub(rest)
                         .mul(stiffnessUniform)
                         .mul(d)
                         .mul(0.5)
                         .div(dist);
        springForceBuffer.element(instanceIndex).assign(f);
      })().compute(sCount);

      computeVertexForces = Fn(() => {
        If(instanceIndex.greaterThanEqual(uint(vCount)), () => Return());
        const param = vertexParamsBuffer.element(instanceIndex).toVar();
        If(param.x.greaterThan(0), () => Return()); // pinned
        const num  = param.y;
        const ptr  = param.z;
        let pos    = vertexPositionBuffer.element(instanceIndex).toVar('pos');
        let force  = vertexForceBuffer.element(instanceIndex).toVar('force');
        force.mulAssign(dampingUniform);

        // spring contributions
        const end = ptr.add(num).toVar('end');
        Loop({ start: ptr, end, type: 'uint', condition: '<' }, ({ i }) => {
          const sid = springListBuffer.element(i).toVar();
          const sf  = springForceBuffer.element(sid);
          const sv  = springVertexIdBuffer.element(sid);
          const sign= select(sv.x.equal(instanceIndex), 1.0, -1.0);
          force.addAssign(sf.mul(sign));
        });

        // gravity
        force.y.subAssign(float(0.00007));

        // wind
        const nse = triNoise3D(pos,1,time).sub(0.2).mul(0.0002);
        force.x.addAssign(nse.mul(windUniform));
        force.z.addAssign(nse.mul(windUniform));

        // —— REPLACED SPHERE COLLISION + INTEGRATION ——
        // 1) tentative next position
        let nextPos = pos.add(force).toVar('nextPos');
        // 2) vector from sphere center → nextPos
        const dir  = nextPos.sub(spherePositionUniform).toVar('dir');
        const dist = dir.length().toVar('dist');
        // 3) if inside, project back out
        If( dist.lessThan(float(sphereRadius)), () => {
          const nDir = dir.div(dist);
          nextPos.assign(
            spherePositionUniform.add(nDir.mul(float(sphereRadius)))
          );
          force.assign(nextPos.sub(pos));
        });
        // 4) write back
        vertexForceBuffer.element(instanceIndex).assign(force);
        vertexPositionBuffer.element(instanceIndex).assign(nextPos);
      })().compute(vCount);
    }

    // Render loop
    async function render() {
      // GUI toggles
      clothMaterial.wireframe = params.showWireframe;
      sphere.visible           = params.showSphere;
      sphereUniform.value      = params.showSphere ? 1 : 0;

      const dt = Math.min(clock.getDelta(), 1/60);
      const stepsPerSec = 300;
      const tStep = 1/stepsPerSec;
      timeSinceLastStep += dt;
      while (timeSinceLastStep >= tStep) {
        timestamp += tStep;
        timeSinceLastStep -= tStep;

        // animate sphere
        sphere.position.set(
          Math.sin(timestamp * 2.1) * 0.1,
          0,
          Math.sin(timestamp * 0.8) * 0.1
        );
        spherePositionUniform.value.copy(sphere.position);

        // update uniforms
        windUniform.value      = params.wind;
        stiffnessUniform.value = params.stiffness;

        await renderer.computeAsync(computeSpringForces);
        await renderer.computeAsync(computeVertexForces);
      }

      await renderer.renderAsync(scene, camera);
    }

    function onWindowResize() {
      camera.aspect = innerWidth/innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    }
  </script>
</body>
</html>
