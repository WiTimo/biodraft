<!DOCTYPE html>
<html lang="en">

<head>
	<title>three.js webgpu - compute cloth</title>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
</head>

<body>
	<div id="info">
		<a href="https://threejs.org" target="_blank" rel="noopener">three.js</a> webgpu - compute cloth<br />
		Simple cloth simulation with a verlet system running in compute shaders
	</div>

	<script type="importmap">
		{
			"imports": {
				"three":        "https://unpkg.com/three@0.173.0/build/three.webgpu.js",
				"three/webgpu": "https://unpkg.com/three@0.173.0/build/three.webgpu.js",
				"three/tsl":    "https://unpkg.com/three@0.173.0/build/three.tsl.js",
				"three/addons/":"https://unpkg.com/three@0.173.0/examples/jsm/"
			}
		}
	</script>

	<script type="module">
		import * as THREE from 'three';
		import {
			Fn, If, Return, instancedArray, instanceIndex,
			uniform, select, attribute, uint, Loop,
			float, transformNormalToView, cross, triNoise3D, time
		} from 'three/tsl';
		import { GUI } from 'three/addons/libs/lil-gui.module.min.js';
		import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
		import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';

		let renderer, scene, camera, controls;
		const sphereRadius = 0.15;

		let vertexPositionBuffer, vertexForceBuffer, vertexParamsBuffer;
		let springVertexIdBuffer, springRestLengthBuffer, springForceBuffer;
		let springListBuffer;
		let computeSpringForces, computeVertexForces;
		let dampeningUniform, spherePositionUniform, stiffnessUniform, sphereUniform, windUniform;
		let vertexWireframeObject, springWireframeObject;
		let clothMesh, clothMaterial, sphere;
		let timeSinceLastStep = 0;
		let timestamp = 0;

		const verletVertices = [];
		const verletSprings = [];
		const verletVertexColumns = [];

		const clock = new THREE.Clock();

		const params = {
			wireframe: false,
			sphere: true,
			wind: 1.0,
		};

		let patternData = null;

		// --------------------------------------------------
		// 1) LOAD JSON
		// --------------------------------------------------
		async function loadConfig() {
			try {
				const response = await fetch('./patterns_with_seams.json');
				if (!response.ok) {
					throw new Error(`HTTP ${response.status} – ${response.statusText}`);
				}
				patternData = await response.json();
				console.log('Loaded JSON data:', patternData);
			} catch (err) {
				console.error('Failed to load patterns_with_seams.json:', err);
			}
		}

		init();

		// --------------------------------------------------
		// 2) INITIALIZATION
		// --------------------------------------------------
		async function init() {
			await loadConfig();

			// Renderer
			renderer = new THREE.WebGPURenderer({ antialias: true });
			renderer.setPixelRatio(window.devicePixelRatio);
			renderer.setSize(window.innerWidth, window.innerHeight);
			renderer.toneMapping = THREE.NeutralToneMapping;
			renderer.toneMappingExposure = 1;
			document.body.appendChild(renderer.domElement);

			// Scene
			scene = new THREE.Scene();

			// Camera
			camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.01, 10);
			camera.position.set(-1.6, -0.1, -1.6);

			// Controls
			controls = new OrbitControls(camera, renderer.domElement);
			controls.minDistance = 1;
			controls.maxDistance = 3;
			controls.target.set(0, -0.1, 0);
			controls.update();

			// HDR Environment
			const rgbeLoader = new RGBELoader().setPath('textures/equirectangular/');
			const hdrTexture = await rgbeLoader.loadAsync('royal_esplanade_1k.hdr');
			hdrTexture.mapping = THREE.EquirectangularReflectionMapping;
			scene.background = hdrTexture;
			scene.backgroundBlurriness = 0.5;
			scene.environment = hdrTexture;

			// ─── BUILD PHYSICS FROM JSON ───
			setupVerletGeometryFromJSON();
			setupVerletVertexBuffers();
			setupVerletSpringBuffers();
			setupUniforms();
			setupComputeShaders();
			setupClothMeshFromJSON();
			setupSphere();

			// GUI
			const gui = new GUI();
			gui.add(stiffnessUniform, 'value', 0.1, 0.5, 0.01).name('stiffness');
			gui.add(params, 'wireframe');
			gui.add(params, 'sphere');
			gui.add(params, 'wind', 0, 5, 0.1);

			const materialFolder = gui.addFolder('material');
			materialFolder.addColor(clothMaterial, 'color');
			materialFolder.add(clothMaterial, 'roughness', 0.0, 1, 0.01);
			materialFolder.add(clothMaterial, 'sheen', 0.0, 1, 0.01);
			materialFolder.add(clothMaterial, 'sheenRoughness', 0.0, 1, 0.01);
			materialFolder.addColor(clothMaterial, 'sheenColor');

			window.addEventListener('resize', onWindowResize);
			renderer.setAnimationLoop(render);
		}

		// --------------------------------------------------
		// 3) SETUP VERTEX‐BASED PHYSICS (VERLET) FROM JSON
		// --------------------------------------------------
		function setupVerletGeometryFromJSON() {
			// Clear any prior data
			verletVertices.length = 0;
			verletSprings.length = 0;
			verletVertexColumns.length = 0;

			// 1) Compute bounding box of ALL JSON points:
			let minX = Infinity, maxX = -Infinity;
			let minY = Infinity, maxY = -Infinity;
			patternData.patterns.forEach(pattern => {
				pattern.points.forEach(pt => {
					minX = Math.min(minX, pt.x);
					maxX = Math.max(maxX, pt.x);
					minY = Math.min(minY, pt.y);
					maxY = Math.max(maxY, pt.y);
				});
			});
			const centerX = (minX + maxX) / 2;
			const centerY = (minY + maxY) / 2;
			const span = Math.max(maxX - minX, maxY - minY);

			// 2) Choose a scale factor so the pattern is large enough to hit the sphere
			const scaleFactor = 1.5;

			// 3) Choose an initial height above the sphere so that it "drops" onto it
			const initialY = sphereRadius + 0.5; // sphereRadius = 0.15, so Y ≈ 0.65

			// 4) Helper‐maps for JSON → Verlet vertices
			const vertexMap = {};

			const addVerletVertex = (x, y, z, isFixed, pointId) => {
				const id = verletVertices.length;
				const vertex = {
					id,
					position: new THREE.Vector3(x, y, z),
					isFixed,
					springIds: [],
					jsonId: pointId
				};
				verletVertices.push(vertex);
				vertexMap[pointId] = vertex;
				return vertex;
			};

			const addVerletSpring = (v0, v1) => {
				const id = verletSprings.length;
				const spring = { id, vertex0: v0, vertex1: v1 };
				v0.springIds.push(id);
				v1.springIds.push(id);
				verletSprings.push(spring);
				return spring;
			};

			// 5) Create one normalized, scaled Verlet‐vertex per JSON point
			patternData.patterns.forEach(pattern => {
				const thisPatternVertices = [];
				pattern.points.forEach(pt => {
					// Normalize JSON → [–0.5…0.5], then multiply by scaleFactor
					const xNorm = ((pt.x - centerX) / span) * scaleFactor;
					const zNorm = ((pt.y - centerY) / span) * scaleFactor;
					// Y = initialY (so it falls downward onto sphere)
					const v = addVerletVertex(xNorm, initialY, zNorm, false, pt.id);
					thisPatternVertices.push(v);
				});
				verletVertexColumns.push(thisPatternVertices);
			});

			// 6) Connect “pattern adjacency” springs
			patternData.patterns.forEach(pattern => {
				const pts = pattern.points;
				const closed = !!pattern.closed;
				for (let i = 0; i < pts.length; i++) {
					const currId = pts[i].id;
					const nextIdx = (i + 1) % pts.length;
					if (nextIdx === 0 && !closed) continue;
					const nextId = pts[nextIdx].id;
					const v0 = vertexMap[currId];
					const v1 = vertexMap[nextId];
					if (v0 && v1) addVerletSpring(v0, v1);
				}
			});

			// 7) Connect “seam” springs between patterns
			patternData.seams.forEach(seamPair => {
				seamPair.forEach(([idA, idB]) => {
					const vA = vertexMap[idA];
					const vB = vertexMap[idB];
					if (vA && vB) addVerletSpring(vA, vB);
				});
			});
		}

		function setupVerletVertexBuffers() {
			const vertexCount = verletVertices.length;
			const springListArray = [];
			const vertexPositionArray = new Float32Array(vertexCount * 3);
			const vertexParamsArray = new Uint32Array(vertexCount * 3);

			for (let i = 0; i < vertexCount; i++) {
				const vertex = verletVertices[i];
				vertexPositionArray[i * 3]     = vertex.position.x;
				vertexPositionArray[i * 3 + 1] = vertex.position.y;
				vertexPositionArray[i * 3 + 2] = vertex.position.z;
				vertexParamsArray[i * 3]       = vertex.isFixed ? 1 : 0;
				if (!vertex.isFixed) {
					vertexParamsArray[i * 3 + 1] = vertex.springIds.length;
					vertexParamsArray[i * 3 + 2] = springListArray.length;
					springListArray.push(...vertex.springIds);
				}
			}

			vertexPositionBuffer = instancedArray(vertexPositionArray, 'vec3').setPBO(true);
			vertexForceBuffer    = instancedArray(vertexCount, 'vec3');
			vertexParamsBuffer   = instancedArray(vertexParamsArray, 'uvec3');
			springListBuffer     = instancedArray(new Uint32Array(springListArray), 'uint').setPBO(true);
		}

		function setupVerletSpringBuffers() {
			const springCount = verletSprings.length;
			const springVertexIdArray = new Uint32Array(springCount * 2);
			const springRestLengthArray = new Float32Array(springCount);

			for (let i = 0; i < springCount; i++) {
				const spring = verletSprings[i];
				springVertexIdArray[i * 2]     = spring.vertex0.id;
				springVertexIdArray[i * 2 + 1] = spring.vertex1.id;
				springRestLengthArray[i]       = spring.vertex0.position.distanceTo(spring.vertex1.position);
			}

			springVertexIdBuffer   = instancedArray(springVertexIdArray, 'uvec2').setPBO(true);
			springRestLengthBuffer = instancedArray(springRestLengthArray, 'float');
			springForceBuffer      = instancedArray(springCount * 3, 'vec3').setPBO(true);
		}

		// --------------------------------------------------
		// 4) BUILD & RENDER THE TRIANGULATED MESH (FROM JSON)
		// --------------------------------------------------
		function setupClothMeshFromJSON() {
  // Remove any old clothMesh if present
  if (clothMesh) {
    scene.remove(clothMesh);
    clothMesh.geometry.dispose();
    clothMesh.material.dispose();
    clothMesh = null;
  }

  //
  // STEP A: Recompute the same bounding‐box/center/scale so mesh vertices match Verlet vertices
  //
  let minX = Infinity, maxX = -Infinity;
  let minY = Infinity, maxY = -Infinity;
  patternData.patterns.forEach(pattern => {
    pattern.points.forEach(pt => {
      minX = Math.min(minX, pt.x);
      maxX = Math.max(maxX, pt.x);
      minY = Math.min(minY, pt.y);
      maxY = Math.max(maxY, pt.y);
    });
  });
  const centerX   = (minX + maxX) / 2;
  const centerY   = (minY + maxY) / 2;
  const span      = Math.max(maxX - minX, maxY - minY);
  const scaleFactor = 1.5;

  //
  // Helper: Given a raw JSON point { x, y, handleIn, handleOut }, return its normalized coords in [-scale..+scale].
  //
  function normalizePoint(pt) {
    return {
      x: ((pt.x - centerX) / span) * scaleFactor,
      y: ((pt.y - centerY) / span) * scaleFactor
    };
  }

  // Build one merged geometry for all patterns
  const mergedGeometry = new THREE.BufferGeometry();
  const positions      = [];
  const indices        = [];
  let   vertexOffset   = 0;

  patternData.patterns.forEach(pattern => {
    const shape = new THREE.Shape();
    const pts   = pattern.points;

    // If there are no points, skip
    if (pts.length === 0) return;

    // 1) Move to the first anchor in normalized space
    const firstRaw = pts[0];
    const firstNorm = normalizePoint(firstRaw);
    shape.moveTo(firstNorm.x, firstNorm.y);

    // 2) For each segment from pts[i - 1] → pts[i], decide whether to use straight line or cubic Bézier
    for (let i = 1; i < pts.length; i++) {
      const prevRaw = pts[i - 1];
      const currRaw = pts[i];

      // Normalize anchors
      const prevNorm = normalizePoint(prevRaw);
      const currNorm = normalizePoint(currRaw);

      // Compute absolute control‐point positions (before normalization):
      const cp1_abs = {
        x: prevRaw.x + (prevRaw.handleOut?.dx || 0),
        y: prevRaw.y + (prevRaw.handleOut?.dy || 0)
      };
      const cp2_abs = {
        x: currRaw.x + (currRaw.handleIn?.dx || 0),
        y: currRaw.y + (currRaw.handleIn?.dy || 0)
      };

      // Check if either handleOut of prev or handleIn of curr is non‐zero. If so, draw a cubic Bézier.
      const hasBezier = (
           (prevRaw.handleOut && (prevRaw.handleOut.dx !== 0 || prevRaw.handleOut.dy !== 0))
        || (currRaw.handleIn  && (currRaw.handleIn.dx  !== 0 || currRaw.handleIn.dy  !== 0))
      );

      if (hasBezier) {
        // Normalize control points
        const cp1_norm = {
          x: ((cp1_abs.x - centerX) / span) * scaleFactor,
          y: ((cp1_abs.y - centerY) / span) * scaleFactor
        };
        const cp2_norm = {
          x: ((cp2_abs.x - centerX) / span) * scaleFactor,
          y: ((cp2_abs.y - centerY) / span) * scaleFactor
        };

        // shape.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, endX, endY)
        shape.bezierCurveTo(
          cp1_norm.x, cp1_norm.y,
          cp2_norm.x, cp2_norm.y,
          currNorm.x, currNorm.y
        );

      } else {
        // Just a straight segment
        shape.lineTo(currNorm.x, currNorm.y);
      }
    }

    // 3) If the pattern is closed, connect last → first
    if (pattern.closed) {
      const lastRaw  = pts[pts.length - 1];
      const lastNorm = normalizePoint(lastRaw);

      // Absolute control‐point for last.handleOut (if any)
      const cp1_abs_last = {
        x: lastRaw.x + (lastRaw.handleOut?.dx || 0),
        y: lastRaw.y + (lastRaw.handleOut?.dy || 0)
      };
      // Absolute control‐point for first.handleIn (if any)
      const cp2_abs_first = {
        x: firstRaw.x + (firstRaw.handleIn?.dx || 0),
        y: firstRaw.y + (firstRaw.handleIn?.dy || 0)
      };

      const hasClosingBezier = (
           (lastRaw.handleOut && (lastRaw.handleOut.dx !== 0 || lastRaw.handleOut.dy !== 0))
        || (firstRaw.handleIn && (firstRaw.handleIn.dx  !== 0 || firstRaw.handleIn.dy  !== 0))
      );

      if (hasClosingBezier) {
        const cp1_norm_last = {
          x: ((cp1_abs_last.x - centerX) / span) * scaleFactor,
          y: ((cp1_abs_last.y - centerY) / span) * scaleFactor
        };
        const cp2_norm_first = {
          x: ((cp2_abs_first.x - centerX) / span) * scaleFactor,
          y: ((cp2_abs_first.y - centerY) / span) * scaleFactor
        };

        // Connect shape from lastNorm → firstNorm via cubic Bézier
        shape.bezierCurveTo(
          cp1_norm_last.x,  cp1_norm_last.y,
          cp2_norm_first.x, cp2_norm_first.y,
          firstNorm.x,      firstNorm.y
        );
      } else {
        // Just a straight line closing
        shape.lineTo(firstNorm.x, firstNorm.y);
      }
    }

    // 4) Triangulate this single Shape into a standalone BufferGeometry
    const shapeGeom = new THREE.ShapeGeometry(shape);

    // Copy its vertex positions (flattened) into our big positions array:
    const posAttr = shapeGeom.getAttribute('position');
    const idxAttr = shapeGeom.getIndex();

    for (let i = 0; i < posAttr.count; i++) {
      positions.push(
        posAttr.getX(i),
        posAttr.getY(i),
        posAttr.getZ(i) // should be 0 for 2D shapes, but we copy it anyway
      );
    }
    // Copy indices, but offset every index by vertexOffset
    for (let i = 0; i < idxAttr.count; i++) {
      indices.push(idxAttr.getX(i) + vertexOffset);
    }
    vertexOffset += posAttr.count;

    shapeGeom.dispose();
  }); // end patternData.patterns.forEach

  // 5) Build the merged BufferGeometry for *all* patterns
  const posArray = new Float32Array(positions);
  const idxArray = new Uint32Array(indices);
  mergedGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
  mergedGeometry.setIndex(new THREE.BufferAttribute(idxArray, 1));
  mergedGeometry.computeVertexNormals();

  // 6) Create the cloth mesh & material (same as before)
  clothMaterial = new THREE.MeshPhysicalNodeMaterial({
    color:          0x204080,
    side:           THREE.DoubleSide,
    transparent:    true,
    opacity:        0.85,
    sheen:          1.0,
    sheenRoughness: 0.5,
    sheenColor:     0xffffff
  });
  clothMesh = new THREE.Mesh(mergedGeometry, clothMaterial);
  clothMesh.frustumCulled = false;
  scene.add(clothMesh);
}

		// --------------------------------------------------
		// 5) SPHERE FOR COLLISION
		// --------------------------------------------------
		function setupSphere() {
			const geometry = new THREE.IcosahedronGeometry(sphereRadius * 0.95, 4);
			const material = new THREE.MeshStandardNodeMaterial();
			sphere = new THREE.Mesh(geometry, material);
			scene.add(sphere);
		}

		// --------------------------------------------------
		// 6) COMPUTE‐SHADERS (VERLET SIMULATION)
		// --------------------------------------------------
		function setupUniforms() {
			dampeningUniform      = uniform(0.99);
			spherePositionUniform = uniform(new THREE.Vector3(0, 0, 0));
			sphereUniform         = uniform(1.0);
			windUniform           = uniform(1.0);
			stiffnessUniform      = uniform(0.2);
		}

		function setupComputeShaders() {
			const vertexCount = verletVertices.length;
			const springCount = verletSprings.length;

			computeSpringForces = Fn(() => {
				If(instanceIndex.greaterThanEqual(uint(springCount)), () => Return());
				const vertexIds  = springVertexIdBuffer.element(instanceIndex);
				const restLength = springRestLengthBuffer.element(instanceIndex);
				const v0pos      = vertexPositionBuffer.element(vertexIds.x);
				const v1pos      = vertexPositionBuffer.element(vertexIds.y);
				const delta      = v1pos.sub(v0pos).toVar();
				const dist       = delta.length().max(0.000001).toVar();
				const force      = dist.sub(restLength).mul(stiffnessUniform).mul(delta).mul(0.5).div(dist);
				springForceBuffer.element(instanceIndex).assign(force);
			})().compute(springCount);

			computeVertexForces = Fn(() => {
				If(instanceIndex.greaterThanEqual(uint(vertexCount)), () => Return());
				const paramsLocal   = vertexParamsBuffer.element(instanceIndex).toVar();
				const isFixedLocal  = paramsLocal.x;
				const springCountL  = paramsLocal.y;
				const springPointer = paramsLocal.z;
				If(isFixedLocal, () => Return());

				const position = vertexPositionBuffer.element(instanceIndex).toVar('vertexPosition');
				const force    = vertexForceBuffer.element(instanceIndex).toVar('vertexForce');
				force.mulAssign(dampeningUniform);

				const ptrStart = springPointer.toVar('ptrStart');
				const ptrEnd   = ptrStart.add(springCountL).toVar('ptrEnd');
				Loop({ start: ptrStart, end: ptrEnd, type: 'uint', condition: '<' }, ({ i }) => {
					const springId      = springListBuffer.element(i).toVar('springId');
					const springForceV  = springForceBuffer.element(springId);
					const springVertexI = springVertexIdBuffer.element(springId);
					const factor        = select(springVertexI.x.equal(instanceIndex), 1.0, -1.0);
					force.addAssign(springForceV.mul(factor));
				});

				// gravity
				force.y.subAssign(0.00005);
				// wind
				const noise     = triNoise3D(position, 1, time).sub(0.2).mul(0.0001);
				const windForce = noise.mul(windUniform);
				force.z.subAssign(windForce);

				// collision with sphere
				const deltaSphere = position.add(force).sub(spherePositionUniform);
				const dist        = deltaSphere.length();
				const sphereForce = float(sphereRadius).sub(dist).max(0).mul(deltaSphere).div(dist).mul(sphereUniform);
				force.addAssign(sphereForce);

				vertexForceBuffer.element(instanceIndex).assign(force);
				vertexPositionBuffer.element(instanceIndex).addAssign(force);
			})().compute(vertexCount);
		}

		// --------------------------------------------------
		// 7) RENDER LOOP
		// --------------------------------------------------
		async function render() {
			// Show/hide the sphere:
			sphere.visible = params.sphere;
			sphereUniform.value = params.sphere ? 1 : 0;

			// Update wind uniform:
			windUniform.value = params.wind;

			// Show/hide the cloth mesh:
			clothMesh.visible = !params.wireframe;

			// Toggle wireframe objects if they exist:
			if (vertexWireframeObject) vertexWireframeObject.visible = params.wireframe;
			if (springWireframeObject) springWireframeObject.visible = params.wireframe;

			const deltaTime = Math.min(clock.getDelta(), 1 / 60);
			const stepsPerSecond = 360;
			const timePerStep = 1 / stepsPerSecond;

			timeSinceLastStep += deltaTime; // <-- corrected typo here
			while (timeSinceLastStep >= timePerStep) {
				timestamp += timePerStep;
				timeSinceLastStep -= timePerStep;
				updateSphere();
				await renderer.computeAsync(computeSpringForces);
				await renderer.computeAsync(computeVertexForces);
			}

			await renderer.renderAsync(scene, camera);
		}

		function updateSphere() {
			sphere.position.set(Math.sin(timestamp * 2.1) * 0.1, 0, Math.sin(timestamp * 0.8));
			spherePositionUniform.value.copy(sphere.position);
		}

		function onWindowResize() {
			camera.aspect = window.innerWidth / window.innerHeight;
			camera.updateProjectionMatrix();
			renderer.setSize(window.innerWidth, window.innerHeight);
		}
	</script>
</body>

</html>
